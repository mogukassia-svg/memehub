<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>表情包生成器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;600;700;900&family=Noto+Serif+SC:wght@500;700&family=ZCOOL+QingKe+HuangYou&family=ZCOOL+XiaoWei&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">跳到主内容</a>
    <div class="app">
      <header class="header">
        <p class="eyebrow">本地处理 · 数据不上传服务器</p>
        <h1 class="title">表情包生成器</h1>
        <p class="subtitle">
          底图请在右侧预览上方选择或拖入。支持两行文本独立设置字号与倾角；于预览画布点选文本后拖动可调整位置。
        </p>
      </header>

      <main id="main" class="grid">
        <section class="panel" aria-labelledby="panel-edit-title">
          <h2 id="panel-edit-title" class="panelTitle">编辑参数</h2>

          <label class="field">
            <span class="label">第一行文本</span>
            <input id="textLine1" type="text" placeholder="请输入第一行内容" maxlength="80" />
          </label>

          <label class="field">
            <span class="label">第二行文本</span>
            <input id="textLine2" type="text" placeholder="请输入第二行内容" maxlength="80" />
          </label>

          <label class="field">
            <span class="label">字体（中文优先；需联网加载 Google Fonts）</span>
            <select id="fontFamilySelect">
              <option value="noto-sans" selected>思源黑体 · 现代利落</option>
              <option value="noto-serif">思源宋体 · 优雅衬线</option>
              <option value="zcool-xiaowei">站酷小薇 · 柔美手写感</option>
              <option value="ma-shan">马善政毛笔 · 张力大字</option>
              <option value="zcool-huangyou">站酷黄油体 · 圆润有力</option>
              <option value="kaiti">系统楷体 · 接近磅楷/正文楷</option>
              <option value="impact">Impact 风 · 经典表情包英文</option>
            </select>
          </label>

          <fieldset class="field fieldset">
            <legend class="label">文本描边颜色（低饱和粉彩色，便于与白色填充搭配）</legend>
            <div class="strokeRow" role="radiogroup" aria-label="描边颜色">
              <label class="strokeOpt"><input type="radio" name="stroke" value="#4a4652" checked /> 炭灰</label>
              <label class="strokeOpt"><input type="radio" name="stroke" value="#7a95b8" /> 雾蓝</label>
              <label class="strokeOpt"><input type="radio" name="stroke" value="#c09098" /> 豆沙</label>
              <label class="strokeOpt"><input type="radio" name="stroke" value="#c4b07a" /> 奶杏</label>
              <label class="strokeOpt"><input type="radio" name="stroke" value="#d4a5b8" /> 雾粉</label>
              <label class="strokeOpt"><input type="radio" name="stroke" value="#a894c4" /> 香芋紫</label>
            </div>
          </fieldset>

          <label class="field">
            <span class="label">第一行字号（像素）：<span id="fontSize1Value">48</span></span>
            <input id="fontSize1Input" type="range" min="16" max="120" step="1" value="48" />
          </label>

          <label class="field">
            <span class="label">第二行字号（像素）：<span id="fontSize2Value">48</span></span>
            <input id="fontSize2Input" type="range" min="16" max="120" step="1" value="48" />
          </label>

          <label class="field">
            <span class="label">第一行倾角（度）：<span id="angle1Value">0</span></span>
            <input id="angle1Input" type="range" min="-45" max="45" step="1" value="0" />
          </label>

          <label class="field">
            <span class="label">第二行倾角（度）：<span id="angle2Value">0</span></span>
            <input id="angle2Input" type="range" min="-45" max="45" step="1" value="0" />
          </label>

          <div class="actions">
            <button id="downloadBtn" type="button" class="btn" disabled>导出 PNG</button>
          </div>

          <p id="hint" class="hint">
            请先在右侧上传底图（点击或拖拽）。加载后第一行默认在画面上方、第二行在下方；在预览画布点选文本并拖动可单独调整位置。导出为 PNG。
          </p>
        </section>

        <section class="panel panel--preview" aria-labelledby="panel-preview-title">
          <h2 id="panel-preview-title" class="panelTitle">实时预览</h2>

          <div id="previewDropTarget" class="previewDropTarget">
            <div
              id="dropZone"
              class="dropZone"
              role="region"
              aria-label="底图上传，支持点击选择或拖拽图片"
            >
              <label class="dropZone__browse">
                <span class="dropZone__browseText">选择图片文件</span>
                <input id="fileInput" class="dropZone__input" type="file" accept="image/*" />
              </label>
              <p class="dropZone__hint">或将图片拖放到本栏任意处（含下方画布）</p>
            </div>

            <div class="canvasWrap">
              <canvas id="canvas" class="canvas canvas--interactive" width="800" height="600"></canvas>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
